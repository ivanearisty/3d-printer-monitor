version: '3.8'

# 3D Print Failure Detection for Bambu Lab Printers
# Uses external RTSP camera + ML API for AI detection

services:
  # ML API - The failure detection model (ONNX)
  ml_api:
    build:
      context: .
      dockerfile: ml_api/Dockerfile
    hostname: ml_api
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      DEBUG: 'False'
      FLASK_APP: 'server.py'
    volumes:
      - model_cache:/model_cache
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3333/hc/"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3

  # Print Monitor - Monitors Bambu printer + RTSP camera for failures
  print_monitor:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      ml_api:
        condition: service_healthy
    environment:
      # Required: Bambu Lab Printer Credentials
      PRINTER_ACCESS_CODE: ${PRINTER_ACCESS_CODE:?PRINTER_ACCESS_CODE is required}
      PRINTER_SERIAL_NUMBER: ${PRINTER_SERIAL_NUMBER:?PRINTER_SERIAL_NUMBER is required}
      PRINTER_IP_ADDRESS: ${PRINTER_IP_ADDRESS:?PRINTER_IP_ADDRESS is required}

      # Required: RTSP Camera Settings
      CAMERA_HOST: ${CAMERA_HOST:?CAMERA_HOST is required}
      CAMERA_PORT: ${CAMERA_PORT:-554}
      CAMERA_USERNAME: ${CAMERA_USERNAME:-}
      CAMERA_PASSWORD: ${CAMERA_PASSWORD:-}
      CAMERA_STREAM_PATH: ${CAMERA_STREAM_PATH:-stream1}

      # ML API URL (internal docker network)
      ML_API_URL: http://ml_api:3333

      # Detection Settings (optional)
      CHECK_INTERVAL_PRINTING: ${CHECK_INTERVAL_PRINTING:-1800}
      CHECK_INTERVAL_IDLE: ${CHECK_INTERVAL_IDLE:-60}
      CONSECUTIVE_FAILURES_TO_STOP: ${CONSECUTIVE_FAILURES_TO_STOP:-2}

volumes:
  model_cache:
