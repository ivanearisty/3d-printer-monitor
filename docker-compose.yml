version: '3.8'

# Minimal 3D Print Failure Detection Setup
# Only includes the ML API for detection and your stream analyzer
# No Django backend, no frontend, no Redis, no database

services:
  # ML API - The failure detection model
  ml_api:
    build:
      context: ./ml_api
      dockerfile: Dockerfile
    hostname: ml_api
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      DEBUG: 'False'
      FLASK_APP: 'server.py'
    volumes:
      - model_cache:/model_cache
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3333/hc/"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3

  # Your stream analyzer that watches the RTSP feed
  stream_analyzer:
    build:
      context: ./stream_analyzer
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      ml_api:
        condition: service_healthy
    environment:
      # RTSP Camera Settings
      CAMERA_USERNAME: ${CAMERA_USERNAME:-admin}
      CAMERA_PASSWORD: ${CAMERA_PASSWORD:-password}
      CAMERA_HOST: ${CAMERA_HOST:-192.168.1.100}
      CAMERA_PORT: ${CAMERA_PORT:-554}
      CAMERA_STREAM_PATH: ${CAMERA_STREAM_PATH:-stream1}
      
      # Detection Settings
      ML_API_URL: http://ml_api:3333
      DETECTION_THRESHOLD: ${DETECTION_THRESHOLD:-0.40}
      ANALYSIS_INTERVAL_SECONDS: ${ANALYSIS_INTERVAL_SECONDS:-10}
      CONSECUTIVE_FAILURES_TO_STOP: ${CONSECUTIVE_FAILURES_TO_STOP:-3}
      MAX_SNAPSHOT_SIZE_MB: ${MAX_SNAPSHOT_SIZE_MB:-200}
      
      # Printer Control (webhook to stop printer - works with OctoPrint, Klipper, etc.)
      PRINTER_STOP_WEBHOOK: ${PRINTER_STOP_WEBHOOK:-}
      PRINTER_API_KEY: ${PRINTER_API_KEY:-}
    volumes:
      - ./snapshots:/app/snapshots

volumes:
  model_cache:
